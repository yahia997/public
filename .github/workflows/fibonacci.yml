name: Evaluate Student Submission

on:
  repository_dispatch:
    types: [fibonacci]

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout student submission
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.student_repo_link }}
          path: student-code

      - name: Checkout private tests repo
        uses: actions/checkout@v4
        with:
          repository: yahia997/private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: tests-folder

      - name: Run evaluation script
        run: |
          python3 tests-folder/fibonacci.py ./student-code/ ${{ github.event.client_payload.submission_id }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.event.client_payload.submission_id }}
          path: reports/${{ github.event.client_payload.submission_id }}.json